<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shohruh Portfolio</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="progress"></div>

<header>
    <div class="logo">SH</div>

    <nav id="nav">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>

    <div class="burger" onclick="toggleMenu()">☰</div>
</header>

<section id="home" class="hero">
    <h1>Hi, I'm Shohruh</h1>
    <p id="typing"></p>
    <div class="buttons">
        <button>Download CV</button>
        <button onclick="scrollToContact()">Contact</button>
    </div>
</section>

<section id="about">
<h2>About</h2>
<div class="grid">
<div class="card">Name: Shohruh</div>
<div class="card">Profession: Developer</div>
<div class="card">Location: Uzbekistan</div>
</div>
</section>

<section id="skills">
<h2>Skills</h2>

<div class="skill">HTML<div class="bar"><div data-width="90%"></div></div></div>
<div class="skill">CSS<div class="bar"><div data-width="85%"></div></div></div>
<div class="skill">JS<div class="bar"><div data-width="80%"></div></div></div>

</section>

<section id="projects">
<h2>Projects</h2>
<div class="grid">
<div class="card">Project 1</div>
<div class="card">Project 2</div>
<div class="card">Project 3</div>
</div>
</section>

<section id="contact">
<h2>Contact</h2>
<div class="card">
<input placeholder="Name">
<input placeholder="Email">
<textarea placeholder="Message"></textarea>
<button>Send</button>
</div>
</section>

<footer>© 2026</footer>

<script src="script.js"></script>
</body>
</html>
